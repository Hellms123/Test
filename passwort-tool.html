<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Passwort Tool</title>
<style>
body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
.karte { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; border: 1px solid #e0e0e0; }
.anzeige { font-family: monospace; font-size: 18px; background: #f5f5f5; padding: 16px; border-radius: 8px; word-break: break-all; margin-bottom: 12px; min-height: 30px; }
button { width: 100%; padding: 12px; background: white; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-size: 15px; margin-top: 8px; }
button:hover { background: #f5f5f5; }
input[type="range"] { width: 100%; }
input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
.optionen { display: flex; flex-wrap: wrap; gap: 12px; margin: 16px 0; }
label { font-size: 13px; color: #666; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.balken-container { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
.balken { height: 100%; border-radius: 4px; transition: width 0.3s, background 0.3s; width: 0%; }
.hinweis { font-size: 13px; color: #888; margin: 4px 0; }
</style>
</head>
<body>

<div class="karte">
  <p style="font-size:13px;color:#888;margin:0 0 12px;">Passwortlänge</p>
  <div style="display:flex;align-items:center;gap:12px;">
    <input type="range" min="6" max="32" value="16" id="laenge" oninput="document.getElementById('laenge-out').textContent=this.value;gen();">
    <span id="laenge-out" style="font-weight:500;">16</span>
    <span style="font-size:13px;color:#888;">Zeichen</span>
  </div>
  <div class="optionen">
    <label><input type="checkbox" id="gross" checked onchange="gen()"> Großbuchstaben</label>
    <label><input type="checkbox" id="klein" checked onchange="gen()"> Kleinbuchstaben</label>
    <label><input type="checkbox" id="zahlen" checked onchange="gen()"> Zahlen</label>
    <label><input type="checkbox" id="sonder" checked onchange="gen()"> Sonderzeichen</label>
  </div>
  <div class="anzeige" id="anzeige">Wird generiert...</div>
  <button onclick="gen()">Neues Passwort generieren</button>
  <button onclick="kop()">Passwort kopieren</button>
  <p id="msg" style="display:none;text-align:center;color:green;font-size:13px;">Kopiert!</p>
</div>

<div class="karte">
  <p style="font-size:13px;color:#888;margin:0 0 12px;">Eigenes Passwort prüfen</p>
  <input type="text" id="manual" placeholder="Passwort eingeben..." oninput="check(this.value)">
</div>

<div class="karte">
  <p style="font-size:13px;color:#888;margin:0 0 12px;">Passwortstärke</p>
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
    <div class="balken-container" style="flex:1;">
      <div class="balken" id="balken"></div>
    </div>
    <span id="staerke" style="font-size:14px;font-weight:500;min-width:80px;text-align:right;"></span>
  </div>
  <div id="hinweise"></div>
</div>

<script>
function gen() {
  let z = "";
  if (document.getElementById("gross").checked) z += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  if (document.getElementById("klein").checked) z += "abcdefghijklmnopqrstuvwxyz";
  if (document.getElementById("zahlen").checked) z += "0123456789";
  if (document.getElementById("sonder").checked) z += "!@#$%&*";
  if (!z) { document.getElementById("anzeige").textContent = "Mindestens eine Option wählen"; return; }
  let l = parseInt(document.getElementById("laenge").value);
  let p = "";
  for (let i = 0; i < l; i++) p += z[Math.floor(Math.random() * z.length)];
  document.getElementById("anzeige").textContent = p;
  check(p);
}

function check(p) {
  let pts = 0; let h = [];
  if (p.length >= 12) pts++; else h.push("Mindestens 12 Zeichen empfohlen");
  if (/[A-Z]/.test(p)) pts++; else h.push("Großbuchstabe fehlt");
  if (/[a-z]/.test(p)) pts++; else h.push("Kleinbuchstabe fehlt");
  if (/[0-9]/.test(p)) pts++; else h.push("Zahl fehlt");
  if (/[!@#$%&*]/.test(p)) pts++; else h.push("Sonderzeichen fehlt");
  let farben = ["#E24B4A","#E24B4A","#EF9F27","#639922","#1D9E75"];
  let texte = ["Sehr schwach","Schwach","Mittel","Stark","Sehr stark"];
  let i = pts > 0 ? pts - 1 : 0;
  document.getElementById("balken").style.width = (pts/5*100) + "%";
  document.getElementById("balken").style.background = farben[i];
  document.getElementById("staerke").textContent = texte[i];
  document.getElementById("staerke").style.color = farben[i];
  document.getElementById("hinweise").innerHTML = h.length === 0
    ? '<p class="hinweis" style="color:green;">Alle Kriterien erfüllt</p>'
    : h.map(x => '<p class="hinweis">⚠ ' + x + '</p>').join("");
}

function kop() {
  let t = document.getElementById("anzeige").textContent;
  navigator.clipboard.writeText(t).then(() => {
    let m = document.getElementById("msg");
    m.style.display = "block";
    setTimeout(() => m.style.display = "none", 2000);
  });
}

gen();
</script>
</body>
</html>
